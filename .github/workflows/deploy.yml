name: Deploy umrah-mgmt

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy Code & Migrate
        run: |
          if [ ! -d "/home/umrah-mgmt/.git" ]; then
            echo "Git repository not found. Initializing clone..."
            git clone https://github.com/khalilksa33/umrah-mgmt /home/umrah-mgmt || (sudo rm -rf /home/umrah-mgmt && sudo mkdir -p /home/umrah-mgmt && sudo chown -R $(whoami):$(whoami) /home/umrah-mgmt && git clone https://github.com/khalilksa33/umrah-mgmt /home/umrah-mgmt)
          fi
          cd /home/umrah-mgmt
          git fetch origin main
          git reset --hard origin/main
          # Dynamically locate bench
          BENCH_CMD="bench"
          if command -v bench &> /dev/null; then
            BENCH_CMD="bench"
          elif [ -f "$HOME/.local/bin/bench" ]; then
            BENCH_CMD="$HOME/.local/bin/bench"
          elif [ -f "/home/frappe/.local/bin/bench" ]; then
            BENCH_CMD="/home/frappe/.local/bin/bench"
          elif [ -f "/usr/local/bin/bench" ]; then
            BENCH_CMD="/usr/local/bin/bench"
          fi
          echo "Using bench command: $BENCH_CMD"

          $BENCH_CMD --site 26i.uk migrate
          $BENCH_CMD build
          $BENCH_CMD restart
