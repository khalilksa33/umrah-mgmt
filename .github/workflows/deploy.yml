name: Deploy umrah-mgmt

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Inspect Dependencies on Host B
        run: |
          echo "=== Python Version ==="
          python3 --version || echo "python3 not found"
          pip3 --version || echo "pip3 not found"
          
          echo "=== Node.js Version ==="
          node --version || echo "node not found"
          npm --version || echo "npm not found"
          
          echo "=== Redis Version ==="
          redis-server --version || echo "redis-server not found"
          redis-cli --version || echo "redis-cli not found"
          
          echo "=== MariaDB / MySQL Version ==="
          mariadb --version || mysql --version || echo "MariaDB/MySQL not found"
          
          echo "=== Active Services ==="
          systemctl is-active mariadb || systemctl is-active mysql || echo "db service not active"
          systemctl is-active redis || systemctl is-active redis-server || echo "redis service not active"
          
          echo "=== Bench & Environment ==="
          which bench || echo "bench not in PATH"
          export PATH="$HOME/.local/bin:$PATH"
          which bench || echo "bench not in local bin PATH"
          
          echo "=== System Info ==="
          uname -a
          df -h
