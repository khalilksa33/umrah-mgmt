name: Deploy business-mgm

on:
  push:
    branches:
      - main

env:
  BENCH_HOME: /home/iicc2/business-mgm
  BENCH_BIN: /home/iicc2/.local/bin/bench

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy Code & Migrate
        run: |
          # Ensure bench and nvm node are on PATH
          export PATH="/home/iicc2/.nvm/versions/node/v20.20.2/bin:/home/iicc2/.local/bin:$HOME/.local/bin:$PATH"

          if [ ! -d "$BENCH_HOME/.git" ]; then
            echo "Git repository not found. Initializing clone..."
            git clone https://github.com/khalilksa33/business-mgm "$BENCH_HOME" \
              || (sudo rm -rf "$BENCH_HOME" \
                  && sudo mkdir -p "$BENCH_HOME" \
                  && sudo chown -R $(whoami):$(whoami) "$BENCH_HOME" \
                  && git clone https://github.com/khalilksa33/business-mgm "$BENCH_HOME")
          fi

          cd "$BENCH_HOME"
          git fetch origin main
          git reset --hard origin/main

          # Write common_site_config.json if missing
          # Using python3 to avoid YAML-heredoc conflicts with JSON braces
          if [ ! -f "sites/common_site_config.json" ]; then
            echo "Creating common_site_config.json..."
            python3 -c "
import json, os
config = {
  'background_workers': 1,
  'db_host': 'localhost',
  'db_port': 3306,
  'redis_cache': 'redis://127.0.0.1:13002',
  'redis_queue': 'redis://127.0.0.1:11002',
  'redis_socketio': 'redis://127.0.0.1:12002',
  'webserver_port': 8000,
  'socketio_port': 9001
}
os.makedirs('sites', exist_ok=True)
with open('sites/common_site_config.json', 'w') as f:
    json.dump(config, f, indent=2)
print('common_site_config.json written successfully.')
"
          fi

          # Check if site_config.json exists — site must be created manually first
          if [ ! -f "sites/26i.uk/site_config.json" ]; then
            echo "=== REQUIRED ACTION ==="
            echo "sites/26i.uk/site_config.json is missing."
            echo "Please run the following commands in your server SSH terminal:"
            echo "  cd $BENCH_HOME"
            echo "  ./setup_server.sh"
            echo "======================="
            exit 1
          fi

          bench --site 26i.uk migrate

          # Build app-by-app to avoid OOM kill from building all at once
          bench build --app frappe
          bench build --app erpnext
          bench build --app hrms
          bench build

          bench restart
